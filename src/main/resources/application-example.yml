# ─── Database Configuration ─────────────────────────────────────────
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/factory_incidents}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin} # Default placeholder
  jpa:
    hibernate:
      ddl-auto: update

# ─── Security Settings ───────────────────────────────────────────────
security:
  jwt:
    # Use a secure 256-bit key in production via environment variable
    secret-key: ${JWT_SECRET:YOUR_SECURE_RANDOM_SECRET_KEY_HERE}
    expiration-time: 3600000 # 1 hour
